name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # The test suite needs no third-party packages: plexapi is imported
      # lazily, so the scanning logic is exercised with fake Plex objects.
      - name: Run tests
        run: python -m unittest discover -s tests -t . -p 'test_*.py' -v
